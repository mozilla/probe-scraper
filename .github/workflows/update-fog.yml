# This workflow periodically calls the fog-update-bot action to update
# the list of FOG metrics.yaml and ping.yaml files from its metrics_index.py


name: "Update FOG"

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    # 04:20 UTC - every morning
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '20 4 * * *'
  workflow_dispatch:

jobs:
  main:
    name: "Update FOG"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: "Update FOG"
        id: fog-updater
        if: github.repository == 'mozilla/probe-scraper'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run --project fog-updater fog-updater
